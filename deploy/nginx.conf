##
## Nginx config for the Cypress Dashboard landing page.
## SSL via Cloudflare Origin Certificate.
##
## Before using this config:
##   1. Generate an Origin Certificate in Cloudflare Dashboard
##      → SSL/TLS → Origin Server → Create Certificate
##   2. Save the certificate to: /etc/ssl/cloudflare/cert.pem
##   3. Save the private key to:  /etc/ssl/cloudflare/key.pem  (chmod 600)
##   4. Set Cloudflare SSL/TLS mode to "Full (strict)"
##
## The install.sh script generates this automatically — this file is for reference.
##

# Redirect HTTP → HTTPS
# Cloudflare will only forward HTTPS, but this catches any direct traffic.
server {
    listen 80;
    listen [::]:80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    # Cloudflare Origin Certificate
    ssl_certificate     /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;

    # Strong TLS settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root  /var/www/cypress-dashboard-site/public;
    index index.html;

    access_log /var/log/nginx/cypress-site.access.log;
    error_log  /var/log/nginx/cypress-site.error.log warn;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for content-hashed assets
    location ~* \.(css|js|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1024;
}
